<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Revista Supervisión Progresar</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.container{
padding:15px;
}

select,input,textarea{
width:100%;
padding:10px;
margin:5px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0b3d91;
color:white;
border:none;
margin-top:8px;
font-size:16px;
border-radius:6px;
}

.card{
background:white;
padding:10px;
margin-top:10px;
border-radius:8px;
}

img{
width:100%;
margin-top:5px;
border-radius:6px;
}

</style>

</head>

<body>

<header>
REVISTA DISCIPLINARIA SUPERVISIÓN
</header>

<div class="container">

<label>Supervisor:</label>

<select id="supervisor">
<option>García</option>
<option>Plata</option>
</select>

<label>Puesto:</label>
<input type="text" id="puesto">

<label>Guarda:</label>
<input type="text" id="guarda">

<label>Falencias:</label>

<label><input type="checkbox" value="Puesto sucio"> Puesto sucio</label>
<label><input type="checkbox" value="Falta uniforme"> Falta uniforme</label>
<label><input type="checkbox" value="Cámara dañada"> Cámara dañada</label>
<label><input type="checkbox" value="Puerta abierta"> Puerta abierta</label>
<label><input type="checkbox" value="Falta elementos"> Falta elementos</label>

<label>Llamado:</label>

<select id="llamado">
<option value="">Sin llamado</option>
<option>Presentación personal</option>
<option>Uso del celular</option>
<option>Puesto abandonado</option>
<option>Incumplimiento funciones</option>
</select>

<label>Observaciones:</label>

<textarea id="obs"></textarea>

<button onclick="guardar()">
Registrar Revista
</button>

<button onclick="verHistorial()">
Ver Historial
</button>

<button onclick="enviarInforme()">
Enviar Informe WhatsApp
</button>

<div id="historial"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAFm4rV5IMqnF8-cOCZQYICuus9zE2PR-E",
authDomain: "revista-supervision.firebaseapp.com",
projectId: "revista-supervision",
storageBucket: "revista-supervision.firebasestorage.app",
messagingSenderId: "989271819941",
appId: "1:989271819941:web:00debe4b19cb101d8baf4c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function guardar(){

let supervisor=document.getElementById("supervisor").value;
let puesto=document.getElementById("puesto").value;
let guarda=document.getElementById("guarda").value;
let llamado=document.getElementById("llamado").value;
let obs=document.getElementById("obs").value;

let fecha=new Date().toLocaleString();

let checks=document.querySelectorAll("input[type=checkbox]");

let falencias=[];

checks.forEach(c=>{
if(c.checked){
falencias.push(c.value);
c.checked=false;
}
});

await addDoc(
collection(db,"revistas"),
{
supervisor,
puesto,
guarda,
falencias,
llamado,
obs,
fecha
}
);

alert("Revista guardada en la nube");

}

async function verHistorial(){

let div=document.getElementById("historial");

div.innerHTML="";

const querySnapshot =
await getDocs(collection(db,"revistas"));

querySnapshot.forEach(doc=>{

let r=doc.data();

div.innerHTML+=`

<div class="card">

<b>Hora:</b> ${r.fecha}<br>

<b>Supervisor:</b> ${r.supervisor}<br>

<b>Puesto:</b> ${r.puesto}<br>

<b>Guarda:</b> ${r.guarda}<br>

<b>Falencias:</b>
${r.falencias.join(", ")}<br>

<b>Llamado:</b>
${r.llamado || "Sin llamado"}<br>

<b>Observaciones:</b>
${r.obs}<br>

</div>

`;

});

}

async function enviarInforme(){

let texto="📋 INFORME DIARIO\n\n";

const querySnapshot =
await getDocs(collection(db,"revistas"));

querySnapshot.forEach(doc=>{

let r=doc.data();

texto+=
"Hora: "+r.fecha+"\n"+
"Puesto: "+r.puesto+"\n"+
"Guarda: "+r.guarda+"\n"+
"Falencias: "+r.falencias.join(", ")+"\n"+
"Observaciones: "+r.obs+"\n\n";

});

let telefono="573235847312";

let url=
"https://wa.me/"+telefono+
"?text="+encodeURIComponent(texto);

window.open(url);

}

window.guardar=guardar;
window.verHistorial=verHistorial;
window.enviarInforme=enviarInforme;

</script>

</body>
</html>
